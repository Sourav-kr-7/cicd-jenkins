---
- name: Ensure apt cache is updated
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present

- name: Install Docker engine
  ansible.builtin.apt:
    name:
      - docker.io
    state: present

- name: Ensure docker service running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Pull application image
  community.docker.docker_image:
    name: "{{ docker_image }}"
    source: pull

- name: Run/Update application container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    image: "{{ docker_image }}"
    state: started
    restart_policy: always
    ports:
      - "{{ app_port }}:8000"
    env:
      APP_ENV: "{{ target_env | default('staging') }}"
